name: Release PR

# Maintains the "Version packages" PR from accumulated changesets.
# This workflow NEVER publishes — merging the Version packages PR is the
# explicit release decision, and publish.yml reacts to that merge.

on:
  push:
    branches: [main]

concurrency: release-pr-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  version-pr:
    # The version-PR merge itself is handled by publish.yml — skip here.
    if: "!startsWith(github.event.head_commit.message, 'Version packages')"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Create or update the Version packages PR
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          commit: "Version packages"
          title: "Version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
